<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador de Postura de Corridas</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<h1>Verificador de Postura de Corridas</h1>
<form id="uploadForm">
<input type="file" id="videoInput" accept="video/*" required>
<button type="submit">Analisar</button>
</form>
<div class="preview">
<video id="previewVideo" controls></video>
</div>
<div class="overlay">
<h2>Visualização anotada</h2>
<div><a id="overlayDownload" href="#" download>Baixar vídeo anotado</a></div>
<div class="overlay-gif">
<img id="overlayGif" alt="Prévia anotada (GIF)">
</div>
<div class="best-frame">
<h3>Melhor posição (lido vs ideal)</h3>
<img id="bestFrame" alt="Melhor frame com comparativo">
</div>
</div>
<div id="result"></div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
